<!DOCTYPE html>
<html lang="en">
<head>

  <title>My Website</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #000000, #1a1a1a);

      text-align: center;

      font-size: 20px;
      background: #00ffcc;
      color: black;
      display: inline-block;
      padding: 12px 25px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0px 0px 15px #00ffcc;
      transition: 0.3s;
    }

    .whatsapp:hover {
      transform: scale(1.05);
      background: #00ffaa;
    }

    footer {
      margin-top: 60px;
      font-size: 14px;
      color: #aaa;

  </style>
</head>
